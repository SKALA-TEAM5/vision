service: "service:VisionService"

include:
  - "service.py"
  - "src/**/*.py"
  - "pyproject.toml"
  - "uv.lock"

python:
  packages:
    - "fastapi==0.115.12"
    - "uvicorn[standard]==0.34.2"
    - "python-multipart==0.0.20"
    - "pillow==11.2.1"
    - "ultralytics==8.3.129"
    - "bentoml>=1.4.0,<2.0.0"
  lock_packages: false

docker:
  distro: debian
  python_version: "3.11"
  system_packages:
    - libgl1
    - libglib2.0-0

envs:
  - name: VISION_MODEL_PATH
    value: /models/ppe-detector.pt
  - name: SAFETY_NET_MODEL_PATH
    value: /models/safety-net-classifier.pt
  - name: VISION_INPUT_DIR
    value: /data/files
  - name: VISION_OUTPUT_DIR
    value: /data/vision_results
